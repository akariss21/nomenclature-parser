<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка документа</title>
    <style>
        .drop-area {
            width: 100%;
            height: 200px;
            border: 2px dashed #cccccc;
            border-radius: 10px;
            text-align: center;
            line-height: 200px;
            font-size: 20px;
            color: #cccccc;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .drop-area.active {
            border-color: #0066cc;
            color: #0066cc;
            background-color: #e6f7ff;
        }
        .loading {
            display: none;
            font-size: 18px;
            color: #0066cc;
            margin-top: 20px;
        }
        #upload-btn {
            display: block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #0066cc;
            color: white;
            border: none;
            cursor: pointer;
        }
        #error-message {
            display: none;
            color: red;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Загрузите файл для конвертации</h1>
    <div id="drop-area" class="drop-area">Перетащите файл сюда или кликните для выбора</div>
    <input type="file" id="file-input" style="display: none;">
    <button id="upload-btn">Загрузить</button>
    <div id="loading" class="loading">Загружается...</div>
    <div id="error-message">Неправильный формат файла. Выберите файл формата docx.</div>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const loadingText = document.getElementById('loading');
        const errorMessage = document.getElementById('error-message');

        dropArea.addEventListener('click', () => fileInput.click());

        dropArea.addEventListener('dragover', (event) => {
            event.preventDefault();
            dropArea.classList.add('active');
            dropArea.textContent = 'Файл перетащен!';
        });

        dropArea.addEventListener('dragleave', () => {
            dropArea.classList.remove('active');
            dropArea.textContent = 'Перетащите файл сюда или кликните для выбора';
        });

        dropArea.addEventListener('drop', (event) => {
            event.preventDefault();
            dropArea.classList.remove('active');
            dropArea.textContent = 'Файл перетащен!';
            fileInput.files = event.dataTransfer.files;
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const fileExtension = file.name.split('.').pop().toLowerCase();

                if (fileExtension !== 'docx') {
                    errorMessage.style.display = 'block';
                    dropArea.textContent = 'Перетащите файл сюда или кликните для выбора';
                } else {
                    errorMessage.style.display = 'none';
                    dropArea.textContent = 'Файл выбран';
                }
            }
        });

        uploadBtn.addEventListener('click', () => {
            const file = fileInput.files[0];
            const fileExtension = file.name.split('.').pop().toLowerCase();

            if (file && fileExtension === 'docx') {
                const formData = new FormData();
                formData.append('document', file);

                uploadBtn.style.display = 'none';
                loadingText.style.display = 'block';

                fetch('/convert-to-excel', {
                    method: 'POST',
                    body: formData,
                })
                .then(response => response.blob())
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'converted.xlsx';
                    link.click();
                    window.URL.revokeObjectURL(url);

                    loadingText.style.display = 'none';
                    uploadBtn.style.display = 'block';
                })
                .catch(error => {
                    alert('Ошибка загрузки файла: ' + error);

                    loadingText.style.display = 'none';
                    uploadBtn.style.display = 'block';
                });
            } else {
                errorMessage.style.display = 'block';
                loadingText.style.display = 'none';
                uploadBtn.style.display = 'block';
            }
        });
    </script>
</body>
</html>
